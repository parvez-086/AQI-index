<!DOCTYPE html>
<html>
<head>
    <title>AQI Prediction</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">
    <h1>AQI Prediction System</h1>
    <form action="/predict" method="post">
        <input type="text" name="co" placeholder="CO AQI value"><br><br>
        <input type="text" name="ozone" placeholder="Ozone AQI value"><br><br>
        <input type="text" name="no2" placeholder="NO2 AQI value"><br><br>
        <input type="text" name="pm25" placeholder="PM2.5 AQI value"><br><br>
        <input type="submit" value="Predict AQI">
    </form>


        <h2>Predicted AQI: {{ result }}</h2>
    
</body>
</html>
